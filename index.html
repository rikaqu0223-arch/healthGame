<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioCurrent</title>
  </head>
  <body>
    <!-- HUD -->
    <div id="hud">
      <div id="score-display">CRYSTALS: <span id="score">0</span></div>
      <div id="energy-bar-wrap">
        <div id="energy-bar"></div>
      </div>
      <div id="timer-display">TIME: <span id="timer">90</span>s</div>
    </div>

    <!-- Boss HUD -->
    <div id="boss-hud" class="hidden">
      <div id="boss-label">PATHOGEN PRIME</div>
      <div id="boss-bar-wrap"><div id="boss-bar"></div></div>
    </div>

    <!-- Sonar button (mobile + desktop) -->
    <button id="sonar-btn">SONAR</button>
    <button id="fire-btn">FIRE</button>

    <!-- Overlay screens -->
    <div id="overlay" class="active">
      <h1>BioCurrent</h1>
      <p>Pilot your bio-submarine through the bloodstream.<br>
         Dodge cholesterol, collect crystals, restore the flow.</p>
      <p class="controls-hint">
        <strong>WASD / Arrows</strong> — steer &nbsp;|&nbsp;
        <strong>Space</strong> — sonar pulse<br>
        <strong>Click / F</strong> — fire torpedo &nbsp;|&nbsp;
        <strong>R</strong> — restart
      </p>
      <button id="start-btn">START MISSION</button>
    </div>

    <div id="end-overlay" class="hidden">
      <h1 id="end-title">FLOW RESTORED</h1>
      <p id="end-stats"></p>
      <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <div id="flash"></div>
    <canvas id="c"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
